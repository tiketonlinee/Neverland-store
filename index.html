<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neverland Ticketing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f5f5;
    color:#111;
    padding-bottom:120px;
}

/* ================= CONTAINER ================= */

.container{
    width:100%;
    max-width:1000px;
    margin:auto;
}

/* ================= HEADER ================= */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 20px;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-box{
    width:56px;
    height:56px;
    border-radius:14px;
    background:linear-gradient(135deg,#2447ff,#1f2dbf);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:30px;
    font-weight:900;
}

.logo-text{
    font-size:38px;
    font-weight:800;
    color:#2b2fb9;
}

.lang{
    background:#eef1f7;
    padding:14px 22px;
    border-radius:999px;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:22px;
    font-weight:600;
}

/* ================= STEP ================= */

.steps{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:22px;
    padding:10px 0 35px;
}

.step{
    width:52px;
    height:52px;
    border-radius:50%;
    border:2px solid #bfc4cf;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:700;
    color:#6b7280;
    background:#fff;
}

.step.active{
    border-color:#3d63ff;
    color:#3d63ff;
}

.step-title{
    font-size:24px;
    font-weight:700;
}

.arrow{
    font-size:46px;
    color:#7a7f89;
    margin-top:-6px;
}

/* ================= BANNER ================= */

.banner{
    padding:0 20px;
}

.banner img{
    width:100%;
    border-radius:28px;
    display:block;
}

/* ================= CATEGORY ================= */

.category-title{
    display:flex;
    align-items:center;
    gap:14px;
    padding:28px 22px 22px;
}

.ticket-icon{
    width:34px;
    height:34px;
    background:linear-gradient(135deg,#3560ff,#2143d8);
    border-radius:10px;
    position:relative;
}

.ticket-icon:before{
    content:"";
    position:absolute;
    width:12px;
    height:12px;
    background:#fff;
    left:11px;
    top:11px;
    border-radius:4px;
}

.category-title h2{
    font-size:28px;
    font-weight:800;
}

/* ================= CARD ================= */

.ticket-list{
    padding:0 20px;
    display:flex;
    flex-direction:column;
    gap:22px;
}

.ticket-card{
    background:#fff;
    border:2px solid #e4e7ec;
    border-radius:28px;
    overflow:hidden;
    position:relative;
}

.ticket-card::before,
.ticket-card::after{
    content:"";
    width:36px;
    height:36px;
    background:#f5f5f5;
    border:2px solid #e4e7ec;
    border-radius:50%;
    position:absolute;
    top:50%;
    transform:translateY(-50%);
}

.ticket-card::before{
    left:-20px;
}

.ticket-card::after{
    right:-20px;
}

.ticket-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:26px 24px 20px;
}

.ticket-name{
    font-size:24px;
    font-weight:800;
    line-height:1.4;
    text-transform:uppercase;
}

.status{
    padding:10px 16px;
    border-radius:14px;
    font-size:16px;
    font-weight:700;
}

.onsale{
    background:#dfe7ff;
    color:#355cff;
}

.soldout{
    background:#ffe0e0;
    color:#d22d2d;
}

.divider{
    border-top:2px dashed #e5e7eb;
}

.ticket-bottom{
    padding:24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.ticket-price{
    font-size:28px;
    font-weight:900;
}

.select-btn{
    border:none;
    background:linear-gradient(135deg,#4870ff,#2c4de4);
    color:#fff;
    padding:18px 26px;
    border-radius:20px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
}

.sold-btn{
    border:none;
    background:#d1d5db;
    color:#6b7280;
    padding:18px 26px;
    border-radius:20px;
    font-size:18px;
    font-weight:700;
}

.qty-box{
    display:none;
    align-items:center;
    gap:14px;
}

.qty-btn{
    width:44px;
    height:44px;
    border:none;
    border-radius:14px;
    background:#2f54eb;
    color:#fff;
    font-size:24px;
    cursor:pointer;
}

.qty-number{
    min-width:30px;
    text-align:center;
    font-size:24px;
    font-weight:800;
}

/* ================= FOOTER ================= */

.checkout{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#fff;
    border-top:1px solid #e5e7eb;
    padding:18px;
    box-shadow:0 -6px 25px rgba(0,0,0,0.08);
}

.checkout-wrap{
    max-width:1000px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
}

.total small{
    font-size:14px;
    color:#666;
}

.total h3{
    margin-top:5px;
    font-size:28px;
    font-weight:900;
}

.buy-btn{
    border:none;
    background:linear-gradient(135deg,#4870ff,#2d4de5);
    color:#fff;
    padding:18px 28px;
    border-radius:18px;
    font-size:17px;
    font-weight:800;
    min-width:190px;
    cursor:pointer;
}

.buy-btn:disabled{
    background:#cfd5e3;
    cursor:not-allowed;
}

.loader{
    width:24px;
    height:24px;
    border:3px solid rgba(255,255,255,0.3);
    border-top:3px solid #fff;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    body{
        zoom:0.88;
    }

    .container{
        max-width:100%;
    }

    .topbar{
        padding:18px 16px;
    }

    .logo-box{
        width:46px;
        height:46px;
        font-size:24px;
    }

    .logo-text{
        font-size:30px;
    }

    .lang{
        padding:10px 18px;
        font-size:18px;
    }

    .steps{
        gap:14px;
        padding:0 16px 26px;
    }

    .step{
        width:44px;
        height:44px;
        font-size:18px;
    }

    .step-title{
        font-size:20px;
    }

    .arrow{
        font-size:34px;
    }

    .banner{
        padding:0 16px;
    }

    .banner img{
        border-radius:22px;
    }

    .category-title{
        padding:24px 18px 18px;
    }

    .category-title h2{
        font-size:24px;
    }

    .ticket-list{
        padding:0 16px;
        gap:18px;
    }

    .ticket-card{
        border-radius:24px;
    }

    .ticket-top{
        padding:22px 20px 18px;
    }

    .ticket-name{
        font-size:20px;
    }

    .status{
        padding:8px 12px;
        font-size:14px;
    }

    .ticket-bottom{
        padding:20px;
    }

    .ticket-price{
        font-size:24px;
    }

    .select-btn,
    .sold-btn{
        padding:14px 20px;
        border-radius:16px;
        font-size:16px;
    }

    .qty-btn{
        width:40px;
        height:40px;
        font-size:20px;
    }

    .qty-number{
        font-size:20px;
    }

    .checkout{
        padding:14px;
    }

    .total h3{
        font-size:22px;
    }

    .buy-btn{
        min-width:160px;
        padding:14px 18px;
        border-radius:16px;
        font-size:15px;
    }

}

</style>
</head>

<body>

<div class="container">

<!-- ================= HEADER ================= -->

<div class="topbar">

    <div class="logo">

        <div class="logo-box">
            A
        </div>

        <div class="logo-text">
            Artatix
        </div>

    </div>

    <div class="lang">
        🇮🇩 ID
    </div>

</div>

<!-- ================= STEP ================= -->

<div class="steps">

    <div class="step active">1</div>

    <div class="step-title">
        Pilih Kategori
    </div>

    <div class="arrow">›</div>

    <div class="step">2</div>

    <div class="arrow">›</div>

    <div class="step">3</div>

    <div class="arrow">›</div>

    <div class="step">4</div>

</div>

<!-- ================= BANNER ================= -->

<div class="banner">
    <img src="banner-never.jpg" alt="Banner Event">
</div>

<!-- ================= CATEGORY ================= -->

<div class="category-title">

    <div class="ticket-icon"></div>

    <h2>
        Kategori Tiket
    </h2>

</div>

<!-- ================= TICKET ================= -->

<div class="ticket-list">

    <!-- PRESALE FESTIVAL -->

    <div class="ticket-card">

        <div class="ticket-top">

            <div class="ticket-name">
                PRESALE - FESTIVAL
            </div>

            <div class="status onsale">
                On Sale
            </div>

        </div>

        <div class="divider"></div>

        <div class="ticket-bottom">

            <div class="ticket-price">
                Rp140.000
            </div>

            <button 
                class="select-btn"
                id="festivalBtn"
                onclick="showQty('festival')">

                Pilih Tiket

            </button>

            <div class="qty-box" id="festivalBox">

                <button class="qty-btn" onclick="minusQty('festival',140000)">
                    -
                </button>

                <div class="qty-number" id="festivalQty">
                    0
                </div>

                <button class="qty-btn" onclick="plusQty('festival',140000)">
                    +
                </button>

            </div>

        </div>

    </div>

    <!-- EARLY BIRD FESTIVAL -->

    <div class="ticket-card">

        <div class="ticket-top">

            <div class="ticket-name">
                EARLY BIRD FESTIVAL
            </div>

            <div class="status soldout">
                Sold Out
            </div>

        </div>

        <div class="divider"></div>

        <div class="ticket-bottom">

            <div class="ticket-price">
                Rp100.000
            </div>

            <button class="sold-btn">
                Sold Out
            </button>

        </div>

    </div>

    <!-- EARLY BIRD VIP -->

    <div class="ticket-card">

        <div class="ticket-top">

            <div class="ticket-name">
                EARLY BIRD VIP
            </div>

            <div class="status soldout">
                Sold Out
            </div>

        </div>

        <div class="divider"></div>

        <div class="ticket-bottom">

            <div class="ticket-price">
                Rp150.000
            </div>

            <button class="sold-btn">
                Sold Out
            </button>

        </div>

    </div>

    <!-- PRESALE VIP -->

    <div class="ticket-card">

        <div class="ticket-top">

            <div class="ticket-name">
                PRESALE VIP
            </div>

            <div class="status soldout">
                Sold Out
            </div>

        </div>

        <div class="divider"></div>

        <div class="ticket-bottom">

            <div class="ticket-price">
                Rp200.000
            </div>

            <button class="sold-btn">
                Sold Out
            </button>

        </div>

    </div>

    <!-- PRESALE 2 VIP -->

    <div class="ticket-card">

        <div class="ticket-top">

            <div class="ticket-name">
                PRESALE 2 VIP
            </div>

            <div class="status onsale">
                On Sale
            </div>

        </div>

        <div class="divider"></div>

        <div class="ticket-bottom">

            <div class="ticket-price">
                Rp250.000
            </div>

            <button 
                class="select-btn"
                id="vipBtn"
                onclick="showQty('vip')">

                Pilih Tiket

            </button>

            <div class="qty-box" id="vipBox">

                <button class="qty-btn" onclick="minusQty('vip',250000)">
                    -
                </button>

                <div class="qty-number" id="vipQty">
                    0
                </div>

                <button class="qty-btn" onclick="plusQty('vip',250000)">
                    +
                </button>

            </div>

        </div>

    </div>

</div>

</div>

<!-- ================= CHECKOUT ================= -->

<div class="checkout">

    <div class="checkout-wrap">

        <div class="total">

            <small>
                Total (<span id="totalTicket">0</span> tiket)
            </small>

            <h3 id="totalPrice">
                Rp0
            </h3>

        </div>

        <button 
            class="buy-btn"
            id="buyBtn"
            disabled
            onclick="buyNow()">

            BELI SEKARANG

        </button>

    </div>

</div>

<script>

let total = 0;
let totalTicket = 0;

const qty = {
    festival:0,
    vip:0
};

function showQty(id){

    document.getElementById(id + "Btn").style.display =
    "none";

    document.getElementById(id + "Box").style.display =
    "flex";
}

function plusQty(id, price){

    qty[id]++;

    total += price;
    totalTicket++;

    updateUI(id);
}

function minusQty(id, price){

    if(qty[id] > 0){

        qty[id]--;

        total -= price;
        totalTicket--;

        updateUI(id);

        if(qty[id] <= 0){

            document.getElementById(id + "Box").style.display =
            "none";

            document.getElementById(id + "Btn").style.display =
            "block";
        }
    }
}

function updateUI(id){

    document.getElementById(id + "Qty").innerText =
    qty[id];

    document.getElementById("totalTicket").innerText =
    totalTicket;

    document.getElementById("totalPrice").innerText =
    "Rp" + total.toLocaleString("id-ID");

    document.getElementById("buyBtn").disabled =
    totalTicket <= 0;
}

function buyNow(){

    const btn =
    document.getElementById("buyBtn");

    btn.innerHTML =
    '<div class="loader"></div>';

    btn.disabled = true;

    setTimeout(() => {

        window.location.href =
        "form.html";

    },3000);

}

</script>

</body>
</html>
